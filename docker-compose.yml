# docker-compose.yml — HomePadel local dev
# Levanta PostgreSQL + pgAdmin para desarrollo local
# Uso: docker compose up -d

services:
  # ──────────────────────────────────────────────
  # Base de datos PostgreSQL
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: homepadel_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-homepadel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-homepadel123}
      POSTGRES_DB: ${DB_NAME:-homepadel}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - homepadel_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-homepadel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # pgAdmin — cliente web para PostgreSQL
  # ──────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: homepadel_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@homepadel.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - homepadel_net

volumes:
  postgres_data:

networks:
  homepadel_net:
    driver: bridge
